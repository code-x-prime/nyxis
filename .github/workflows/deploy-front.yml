name: Deploy Front (Nyxis)

on:
  push:
    branches: [main]
    paths:
      - "front/**"
      - ".github/workflows/deploy-front.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy front to VPS
        uses: appleboy/ssh-action@v1.0.3

        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}

          script: |
            set -e

            cd ${{ secrets.REPO_PATH }}

            echo "📥 Pulling latest code from main..."
            git remote prune origin
            git fetch origin main
            git reset --hard origin/main

            cd front

            echo "🧹 Cleaning old build and dependencies..."
            rm -rf dist node_modules

            echo "📦 Installing fresh dependencies..."
            npm ci

            echo "🏗️ Building front..."
            if npm run build; then
              echo "🚀 Build successful! Reloading PM2 for zero-downtime..."
              pm2 reload traya-front --update-env || pm2 start npm --name "traya-front" -- start
              echo "✅ Front deployed successfully!"
            else
              echo "❌ Build failed! Keeping the current version running."
              exit 1
            fi