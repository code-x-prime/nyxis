name: Deploy Client (Nyxis)

on:
  push:
    branches: [main]
    paths:
      - "client/**"
      - ".github/workflows/deploy-client.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy client to VPS
        uses: appleboy/ssh-action@v1.0.3

        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}

          script: |
            set -e

            cd ${{ secrets.REPO_PATH }}

            echo "📥 Pulling latest code from main..."
            git fetch origin main
            git reset --hard origin/main

            cd client

            echo "🧹 Cleaning old build and dependencies..."
            rm -rf .next node_modules

            echo "📦 Installing fresh dependencies..."
            npm ci

            echo "🏗️ Building client (Nyxis)..."
            if npm run build; then
              echo "🚀 Build successful! Reloading PM2 for zero-downtime..."
              pm2 reload traya-client --update-env || pm2 start npm --name "traya-client" -- start
              echo "✅ Client deployed successfully!"
            else
              echo "❌ Build failed! Keeping the current version running."
              exit 1
            fi